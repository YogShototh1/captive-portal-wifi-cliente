<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso Wi-Fi - Bem-vindo à Primix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container Principal Centralizado -->
    <main class="login-container">
        
        <!-- Cabeçalho do Portal (Logo e Mensagem de Boas-Vindas) -->
        <header class="portal-header">
            <!-- Logo oficial da Primix, com recorte dinâmico no CSS -->
            <div class="logo-wrapper">
                <img src="logo.jpeg" alt="Logo Primix" class="logo-image">
            </div>
            <!-- Título Principal com destaque visual e peso forte -->
            <h1 class="brand-title">Bem-vindo à Primix</h1>
            <!-- Subtítulo de boa legibilidade, complementando o cabeçalho -->
            <p class="brand-subtitle">A loja do coração</p>
        </header>

        <!-- Seção de Mensagens de Erro (pode ser populada pelo MikroTik) -->
        <div id="error-message" class="error-box" style="display: none;">
            <span class="error-text">Ocorreu um erro na autenticação. Tente novamente.</span>
        </div>

        <!-- Formulário de Autenticação - ETAPA 1 (Coleta de Telefone) -->
        <!-- Ao submeter, salva o telefone e redireciona para anuncio.html para a ETAPA 2 -->
        <form id="hotspot-form" action="anuncio.html" method="get" novalidate>
            
            <!-- Campo de Telefone -->
            <div class="input-group">
                <label for="phone">Número de Telefone</label>
                <div class="input-wrapper">
                    <!-- Ícone de Telefone SVG em tom de amarelo contrastante -->
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6.62 10.79C8.06 13.62 10.38 15.93 13.21 17.38L15.41 15.18C15.69 14.9 16.08 14.82 16.43 14.93C17.55 15.3 18.75 15.5 20 15.5C20.55 15.5 21 15.95 21 16.5V20C21 20.55 20.55 21 20 21C10.61 21 3 13.39 3 4C3 3.45 3.45 3 4 3H7.5C8.05 3 8.5 3.45 8.5 4C8.5 5.25 8.7 6.45 9.07 7.57C9.18 7.92 9.1 8.31 8.82 8.59L6.62 10.79Z" fill="#ffd100"/>
                        </svg>
                    </span>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="(11) 99999-9999" 
                        autocomplete="tel"
                        required
                        aria-required="true"
                    >
                </div>
                <span class="validation-message" id="phone-validation-error" aria-live="polite">Por favor, insira um número de telefone válido.</span>
            </div>

            <!-- Botão de Confirmação estilizado com a paleta amarela e preta -->
            <button type="submit" id="btn-submit" class="btn-primary">
                <span>Confirmar e Continuar</span>
                <span class="spinner" id="btn-spinner" style="display: none;"></span>
            </button>
        </form>

        <!-- Rodapé do Portal com Links Legais reestilizados -->
        <footer class="portal-footer">
            <button type="button" class="btn-link" id="btn-terms">Termos e Condições</button>
            <span class="footer-separator">•</span>
            <button type="button" class="btn-link" id="btn-privacy">Política de Privacidade</button>
            <p class="copyright">&copy; 2026 Primix - A loja do coração. Todos os direitos reservados.</p>
        </footer>

    </main>

    <!-- Modal Elegante para Termos e Políticas reestilizado em Amarelo/Preto/Branco -->
    <div class="modal-overlay" id="legal-modal" aria-hidden="true" role="dialog">
        <div class="modal-card">
            <header class="modal-header">
                <h2 id="modal-title">Termos de Uso</h2>
                <button type="button" class="modal-close-btn" id="modal-close" aria-label="Fechar modal">&times;</button>
            </header>
            <div class="modal-body" id="modal-content">
                <!-- Conteúdo dinâmico inserido via JavaScript -->
            </div>
            <footer class="modal-footer">
                <button type="button" class="btn-secondary" id="modal-close-footer">Fechar</button>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
