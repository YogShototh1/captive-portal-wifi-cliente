<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anúncio - Primix</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos adicionais dedicados para a página de anúncio */
        .ad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Moldura de destaque para a imagem de propaganda */
        .ad-frame {
            width: 100%;
            background-color: var(--color-black-deep);
            border: 2px solid rgba(255, 209, 0, 0.3);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ad-image {
            width: 100%;
            max-height: 400px; /* Limita a altura para não empurrar os botões para fora em telas móveis */
            object-fit: contain; /* Mantém a proporção perfeita do anúncio */
            display: block;
            transition: transform 0.5s ease;
        }

        .ad-frame:hover .ad-image {
            transform: scale(1.02); /* Sutil zoom de interação corporativa */
        }

        /* Bloco do Cronômetro Regressivo */
        .countdown-wrapper {
            margin: 12px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .countdown-message {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-light);
            letter-spacing: 0.5px;
        }

        /* Círculo do contador com número grande e chamativo */
        .countdown-number-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--color-black-deep);
            border: 3px solid var(--color-yellow-main);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            color: var(--color-yellow-main);
            box-shadow: 0 0 15px rgba(255, 209, 0, 0.15);
            transition: all 0.3s ease;
        }

        .countdown-number-circle.finished {
            background-color: var(--color-yellow-main);
            color: var(--color-black-deep);
            border-color: var(--color-white);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 209, 0, 0.4);
        }

        /* Botão continuar desabilitado */
        .btn-primary:disabled {
            background-color: var(--color-border);
            color: var(--color-text-muted);
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <!-- Container Principal Centralizado -->
    <main class="login-container">
        
        <div class="ad-container">
            
            <!-- Logo Simplificada e Título no Topo do Anúncio -->
            <header class="portal-header" style="margin-bottom: 20px;">
                <h1 class="brand-title" style="font-size: 22px;">Oferta Especial Primix</h1>
                <p class="brand-subtitle" style="font-size: 13px;">Confira nossa grande oportunidade abaixo!</p>
            </header>

            <!-- Moldura Responsiva da Propaganda -->
            <div class="ad-frame">
                <!-- Carrega automaticamente anuncio.jpg - fácil de atualizar simplesmente substituindo o arquivo -->
                <img src="anuncio.jpg" alt="Propaganda Primix" class="ad-image">
            </div>

            <!-- Wrapper do Cronômetro Regressivo -->
            <div class="countdown-wrapper">
                <span class="countdown-message" id="countdown-msg">Aguarde para liberar o Wi-Fi...</span>
                <div class="countdown-number-circle" id="countdown-timer">10</div>
            </div>

            <!-- Botão de Ação (Habilitado somente após 10 segundos) -->
            <button id="btn-continue" class="btn-primary" disabled>
                <span>Aguarde (10s)</span>
                <span class="spinner" id="btn-spinner" style="display: none;"></span>
            </button>

        </div>

        <!-- Formulário Oculto de Login Nativo para Integração com MikroTik RouterOS -->
        <!-- O MikroTik processará e substituirá as variáveis ao carregar o portal -->
        <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
            <input type="hidden" name="username" id="mk-username" />
            <input type="hidden" name="password" id="mk-password" />
            <input type="hidden" name="dst" value="$(link-orig)" />
            <input type="hidden" name="popup" value="true" />
        </form>

        <!-- Rodapé do Portal -->
        <footer class="portal-footer" style="margin-top: 24px;">
            <p class="copyright">&copy; 2026 Primix - A loja do coração. Todos os direitos reservados.</p>
        </footer>

    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const timerElement = document.getElementById("countdown-timer");
            const msgElement = document.getElementById("countdown-msg");
            const btnContinue = document.getElementById("btn-continue");
            const btnSpinner = document.getElementById("btn-spinner");
            
            let timeLeft = 10; // 10 segundos de espera obrigatórios

            // Inicia o contador regressivo
            const countdownInterval = setInterval(function () {
                timeLeft--;
                timerElement.textContent = timeLeft;
                btnContinue.querySelector("span").textContent = `Aguarde (${timeLeft}s)`;

                // Efeito sonoro/interativo visual opcional de pulsação a cada segundo
                timerElement.style.transform = "scale(1.05)";
                setTimeout(() => {
                    if (timeLeft > 0) {
                        timerElement.style.transform = "scale(1)";
                    }
                }, 150);

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    
                    // Atualiza mensagens e ativa o círculo
                    msgElement.textContent = "Seu acesso está pronto!";
                    timerElement.textContent = "✓";
                    timerElement.classList.add("finished");
                    
                    // Habilita o botão
                    btnContinue.disabled = false;
                    btnContinue.querySelector("span").textContent = "Liberar Wi-Fi";
                }
            }, 1000);

            // Ação de clique do botão habilitado (ETAPA 4 e 5)
            btnContinue.addEventListener("click", function () {
                btnContinue.disabled = true;
                btnSpinner.style.display = "inline-block";
                btnContinue.querySelector("span").textContent = "Conectando...";

                // Resgata o telefone digitado na index
                const rawPhone = sessionStorage.getItem("user_phone") || "00000000000";
                // Limpa formatação para deixar apenas dígitos
                const cleanPhone = rawPhone.replace(/\D/g, "");

                // Verifica se está rodando de fato dentro do roteador MikroTik Hotspot
                const isMikrotikEnv = (typeof document.sendin !== "undefined" && document.sendin.action.indexOf("$") === -1);

                if (isMikrotikEnv) {
                    // Integração Definitiva com o MikroTik RouterOS:
                    // Define o usuário como o número de telefone do cliente
                    document.getElementById("mk-username").value = cleanPhone;
                    
                    // A senha pode ser o mesmo telefone, vazia ou uma senha global fixa de hotspot
                    document.getElementById("mk-password").value = "primix_wifi_access";
                    
                    // Submete o formulário nativo do MikroTik para autenticar e liberar a navegação
                    setTimeout(function() {
                        document.sendin.submit();
                    }, 800);
                } else {
                    // Simulação em Ambiente de Testes Local (Offline)
                    setTimeout(function () {
                        window.location.href = "liberado.html";
                    }, 1200);
                }
            });
        });
    </script>
</body>
</html>
